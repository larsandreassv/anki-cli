# The configurations that used for the recording, feel free to edit them
config:

  command: bash assets/terminalizer/demo.sh
  cwd: /home/larsandreas/repos/anki-cli
  env:
    recording: true
  cols: 84
  rows: 20
  repeat: 0
  quality: 100
  frameDelay: auto
  maxIdleTime: 1000
  frameBox:
    type: floating
    title: anki demo
    style:
      border: 0px black solid
  cursorStyle: block
  fontFamily: "Monaco, Lucida Console, Ubuntu Mono, Monospace"
  fontSize: 14
  lineHeight: 1
  letterSpacing: 0
  theme:
    background: "#111827"
    foreground: "#e5e7eb"
    cursor: "#f9fafb"
    black: "#1f2937"
    red: "#f87171"
    green: "#34d399"
    yellow: "#fbbf24"
    blue: "#60a5fa"
    magenta: "#c084fc"
    cyan: "#22d3ee"
    white: "#f3f4f6"
    brightBlack: "#4b5563"
    brightRed: "#fca5a5"
    brightGreen: "#6ee7b7"
    brightYellow: "#fcd34d"
    brightBlue: "#93c5fd"
    brightMagenta: "#d8b4fe"
    brightCyan: "#67e8f9"
    brightWhite: "#ffffff"
  
# Records, feel free to edit them
records:
  - delay: 227
    content: "\r\n$ ./bin/anki connect ping\r\n"
  - delay: 56
    content: "reachable, version 6\r\n"
  - delay: 802
    content: "\r\n$ ./bin/anki deck list\r\n"
  - delay: 55
    content: "Japanese::RTK\r\nJapanese::WordWrite\r\n"
  - delay: 804
    content: "\r\n$ ./bin/anki model fields RTK\r\n"
  - delay: 83
    content: "Keyword\r\nKanji\r\n"
  - delay: 804
    content: "\r\n$ ./bin/anki note add --deck Japanese::RTK --model RTK --field Keyword=festival --field Kanji=祭\r\n"
  - delay: 172
    content: "123456789\r\n"
  - delay: 804
    content: "\r\n$ ./bin/anki connect call findNotes {\"query\":\"deck:Japanese::RTK\"}\r\n"
  - delay: 47
    content: "[123456789]\r\n"
